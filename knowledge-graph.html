<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Knowledge Graph — Package Engineer</title>
<style>
*{box-sizing:border-box;margin:0;padding:0}
:root{
  --bg1:#ffffff;--bg2:#f7f6f2;--bg3:#f1efe8;
  --t1:#2c2c2a;--t2:#5f5e5a;--t3:#888780;
  --b2:rgba(44,44,42,.25);--b3:rgba(44,44,42,.12);
  --blue:#185FA5;--blue-bg:#E6F1FB;--blue-t:#0C447C;
  --green:#639922;--green-bg:#EAF3DE;--green-t:#27500A;
  --amber:#BA7517;--amber-bg:#FAEEDA;--amber-t:#633806;
  --red:#E24B4A;--red-bg:#FCEBEB;--red-t:#791F1F;
  --purple:#534AB7;--purple-bg:#EEEDFE;--purple-t:#26215C;
  font-family:-apple-system,BlinkMacSystemFont,'Segoe UI',sans-serif;
  font-size:13px;color:var(--t1);
}
@media(prefers-color-scheme:dark){:root{
  --bg1:#1e1e1c;--bg2:#252523;--bg3:#2c2c2a;
  --t1:#e8e6dc;--t2:#a8a69e;--t3:#666660;
  --b2:rgba(220,218,210,.2);--b3:rgba(220,218,210,.1);
  --blue:#378ADD;--blue-bg:#042C53;--blue-t:#85B7EB;
  --green:#639922;--green-bg:#173404;--green-t:#C0DD97;
  --amber:#EF9F27;--amber-bg:#412402;--amber-t:#FAC775;
  --red:#E24B4A;--red-bg:#501313;--red-t:#F09595;
  --purple:#7F77DD;--purple-bg:#26215C;--purple-t:#CECBF6;
}}
html,body{height:100%;overflow:hidden;background:var(--bg3)}
.topbar{height:48px;background:var(--bg1);border-bottom:0.5px solid var(--b3);display:flex;align-items:center;padding:0 16px;gap:10px}
.logo{font-size:14px;font-weight:600;letter-spacing:-.02em}.logo span{color:var(--blue)}
.tb-sep{color:var(--b2)}.tb-sub{font-size:11px;color:var(--t3)}.spacer{flex:1}
.tb-pill{font-size:10px;padding:2px 8px;border-radius:99px;font-weight:500}
.layout{display:flex;height:calc(100vh - 48px)}
canvas{flex:1;cursor:grab;display:block}
canvas:active{cursor:grabbing}
.legend{position:fixed;bottom:20px;left:20px;background:var(--bg1);border:0.5px solid var(--b3);border-radius:10px;padding:12px 14px;min-width:155px}
.leg-title{font-size:10px;font-weight:600;color:var(--t3);text-transform:uppercase;letter-spacing:.06em;margin-bottom:8px}
.leg-row{display:flex;align-items:center;gap:7px;margin-bottom:5px}
.leg-dot{width:10px;height:10px;border-radius:50%;flex-shrink:0}
.leg-label{font-size:11px;color:var(--t2)}
.controls{position:fixed;top:64px;left:16px;display:flex;flex-direction:column;gap:6px}
.ctrl-btn{width:32px;height:32px;border-radius:7px;background:var(--bg1);border:0.5px solid var(--b3);display:flex;align-items:center;justify-content:center;cursor:pointer;font-size:16px;color:var(--t2);line-height:1;text-align:center}
.ctrl-btn:hover{background:var(--bg2)}
.detail{position:fixed;top:64px;right:16px;width:275px;background:var(--bg1);border:0.5px solid var(--b3);border-radius:12px;overflow:hidden;display:none}
.detail.visible{display:block}
.dp-header{padding:12px 14px 9px;border-bottom:0.5px solid var(--b3)}
.dp-type{font-size:10px;font-weight:600;text-transform:uppercase;letter-spacing:.06em;margin-bottom:3px}
.dp-name{font-size:15px;font-weight:500;color:var(--t1)}
.dp-body{padding:10px 14px;max-height:calc(100vh - 180px);overflow-y:auto}
.dp-row{display:flex;justify-content:space-between;margin-bottom:5px;gap:8px}
.dp-label{font-size:11px;color:var(--t3);flex-shrink:0}
.dp-val{font-size:11px;color:var(--t1);font-weight:500;text-align:right}
.dp-tags{display:flex;flex-wrap:wrap;gap:4px;margin-top:7px}
.dp-tag{font-size:10px;padding:2px 7px;border-radius:3px;font-weight:500}
.dp-edges{margin-top:9px;border-top:0.5px solid var(--b3);padding-top:9px}
.dp-edge-title{font-size:10px;font-weight:600;color:var(--t3);text-transform:uppercase;letter-spacing:.06em;margin-bottom:5px}
.dp-edge-item{font-size:11px;color:var(--blue-t);background:var(--blue-bg);border-radius:4px;padding:3px 7px;margin-bottom:3px;cursor:pointer;display:block}
.dp-edge-item:hover{opacity:.75}
.search-wrap{position:fixed;top:64px;left:50%;transform:translateX(-50%);background:var(--bg1);border:0.5px solid var(--b3);border-radius:8px;display:flex;align-items:center;padding:0 10px;gap:8px;width:280px;box-shadow:0 2px 8px rgba(0,0,0,.07)}
.search-wrap input{flex:1;border:none;background:none;font-size:13px;color:var(--t1);outline:none;padding:8px 0}
</style>
</head>
<body>
<div class="topbar">
  <div class="logo">Package<span>Engineer</span></div>
  <span class="tb-sep">/</span>
  <span class="tb-sub">Knowledge graph</span>
  <div class="spacer"></div>
  <span class="tb-pill" style="background:var(--blue-bg);color:var(--blue-t)">NCS-1A · C-4420A</span>
  <span class="tb-pill" style="background:var(--bg2);color:var(--t2);border:0.5px solid var(--b3)">24 nodes · 38 edges</span>
</div>
<div class="layout"><canvas id="g"></canvas></div>
<div class="controls">
  <div class="ctrl-btn" onclick="zoom(1.2)">+</div>
  <div class="ctrl-btn" onclick="zoom(0.83)">−</div>
  <div class="ctrl-btn" onclick="reset()" style="font-size:12px">⌂</div>
</div>
<div class="search-wrap">
  <span style="color:var(--t3);font-size:12px">&#9906;</span>
  <input id="srch" type="text" placeholder="Search nodes…" oninput="handleSearch(this.value)">
</div>
<div class="legend">
  <div class="leg-title">Node types</div>
  <div class="leg-row"><div class="leg-dot" style="background:#185FA5"></div><span class="leg-label">Equipment</span></div>
  <div class="leg-row"><div class="leg-dot" style="background:#534AB7"></div><span class="leg-label">IMF type</span></div>
  <div class="leg-row"><div class="leg-dot" style="background:#639922"></div><span class="leg-label">Document</span></div>
  <div class="leg-row"><div class="leg-dot" style="background:#BA7517"></div><span class="leg-label">Work order</span></div>
  <div class="leg-row"><div class="leg-dot" style="background:#E24B4A"></div><span class="leg-label">Deviation</span></div>
  <div class="leg-row"><div class="leg-dot" style="background:#888780"></div><span class="leg-label">System</span></div>
</div>
<div class="detail" id="det">
  <div class="dp-header">
    <div class="dp-type" id="dp-type"></div>
    <div class="dp-name" id="dp-name"></div>
  </div>
  <div class="dp-body" id="dp-body"></div>
</div>
<script>
const C=document.getElementById('g'), ctx=C.getContext('2d');
const COL={equipment:'#185FA5',imf:'#534AB7',document:'#639922',workorder:'#BA7517',deviation:'#E24B4A',system:'#888780'};
const nodes=[
  {id:'C-4420A',type:'equipment',label:'C-4420A',sub:'Gas Compressor',x:500,y:300,r:28},
  {id:'V-4401',type:'equipment',label:'V-4401',sub:'Inlet Separator',x:260,y:210,r:22},
  {id:'V-4402',type:'equipment',label:'V-4402',sub:'Suction Scrubber',x:350,y:320,r:20},
  {id:'E-4401',type:'equipment',label:'E-4401',sub:'Discharge Cooler',x:660,y:270,r:22},
  {id:'P-4401A',type:'equipment',label:'P-4401A',sub:'LO Pump A',x:450,y:430,r:17},
  {id:'P-4401B',type:'equipment',label:'P-4401B',sub:'LO Pump B',x:550,y:430,r:17},
  {id:'FV-4403',type:'equipment',label:'FV-4403',sub:'Recycle Valve',x:400,y:170,r:16},
  {id:'XV-4421',type:'equipment',label:'XV-4421',sub:'Bypass Valve',x:610,y:170,r:16},
  {id:'IMF-COMP',type:'imf',label:'Compressor',sub:'IMF type',x:700,y:370,r:20},
  {id:'IMF-VES',type:'imf',label:'Vessel',sub:'IMF type',x:160,y:300,r:18},
  {id:'IMF-HEX',type:'imf',label:'HeatExchanger',sub:'IMF type',x:770,y:190,r:20},
  {id:'IMF-VALVE',type:'imf',label:'ControlValve',sub:'IMF type',x:290,y:430,r:18},
  {id:'IMF-PUMP',type:'imf',label:'Pump',sub:'IMF type',x:610,y:490,r:18},
  {id:'VDS-4420',type:'document',label:'VDS-4420',sub:'Vendor Data Sheet',x:190,y:150,r:16},
  {id:'ITP-4420',type:'document',label:'ITP-4420',sub:'Insp & Test Plan',x:310,y:130,r:16},
  {id:'PID-4420',type:'document',label:'PID-4420',sub:'P&ID',x:460,y:90,r:16},
  {id:'FAT-4420',type:'document',label:'FAT-4420',sub:'FAT Procedure',x:610,y:100,r:16},
  {id:'GAD-4420',type:'document',label:'GAD-4420',sub:'Gen Arrangement',x:760,y:130,r:16},
  {id:'WO-88241',type:'workorder',label:'WO-88241',sub:'LO sample',x:330,y:500,r:16},
  {id:'WO-88299',type:'workorder',label:'WO-88299',sub:'Vibration baseline',x:460,y:520,r:16},
  {id:'WO-88310',type:'workorder',label:'WO-88310',sub:'Cooler backflush',x:710,y:450,r:16},
  {id:'DEV-01',type:'deviation',label:'DEV-4420-01',sub:'High temp',x:790,y:330,r:18},
  {id:'DEV-02',type:'deviation',label:'DEV-4420-02',sub:'Low surge margin',x:155,y:400,r:18},
  {id:'SYS-NCS1A',type:'system',label:'NCS-1A',sub:'Process system',x:500,y:210,r:18},
];
const edges=[
  {from:'V-4401',to:'C-4420A',label:'feeds'},{from:'V-4402',to:'C-4420A',label:'suction'},
  {from:'C-4420A',to:'E-4401',label:'discharge'},{from:'C-4420A',to:'FV-4403',label:'recycle ctrl'},
  {from:'C-4420A',to:'XV-4421',label:'bypass ctrl'},{from:'P-4401A',to:'C-4420A',label:'lube oil'},
  {from:'P-4401B',to:'C-4420A',label:'lube oil'},{from:'FV-4403',to:'V-4402',label:'recycles to'},
  {from:'C-4420A',to:'IMF-COMP',label:'instanceOf'},{from:'V-4401',to:'IMF-VES',label:'instanceOf'},
  {from:'V-4402',to:'IMF-VES',label:'instanceOf'},{from:'E-4401',to:'IMF-HEX',label:'instanceOf'},
  {from:'FV-4403',to:'IMF-VALVE',label:'instanceOf'},{from:'XV-4421',to:'IMF-VALVE',label:'instanceOf'},
  {from:'P-4401A',to:'IMF-PUMP',label:'instanceOf'},{from:'P-4401B',to:'IMF-PUMP',label:'instanceOf'},
  {from:'VDS-4420',to:'C-4420A',label:'describes'},{from:'ITP-4420',to:'C-4420A',label:'governs QA'},
  {from:'PID-4420',to:'C-4420A',label:'shows'},{from:'PID-4420',to:'V-4402',label:'shows'},
  {from:'FAT-4420',to:'C-4420A',label:'tests'},{from:'GAD-4420',to:'C-4420A',label:'arrangement'},
  {from:'WO-88241',to:'P-4401A',label:'sample point'},{from:'WO-88241',to:'C-4420A',label:'triggered by'},
  {from:'WO-88299',to:'C-4420A',label:'baseline for'},{from:'WO-88310',to:'E-4401',label:'backflush'},
  {from:'DEV-01',to:'C-4420A',label:'affects'},{from:'DEV-01',to:'E-4401',label:'root cause'},
  {from:'DEV-02',to:'FV-4403',label:'remedied by'},{from:'DEV-02',to:'C-4420A',label:'affects'},
  {from:'SYS-NCS1A',to:'C-4420A',label:'contains'},{from:'SYS-NCS1A',to:'V-4401',label:'contains'},
  {from:'SYS-NCS1A',to:'E-4401',label:'contains'},{from:'SYS-NCS1A',to:'V-4402',label:'contains'},
  {from:'ITP-4420',to:'FAT-4420',label:'referenced by'},{from:'PID-4420',to:'E-4401',label:'shows'},
  {from:'WO-88310',to:'DEV-01',label:'addresses'},{from:'DEV-02',to:'WO-88299',label:'triggers'},
];
const dets={
  'C-4420A':{props:[['Tag','C-4420A'],['Type','Centrifugal compressor'],['Speed','8 420 rpm'],['Discharge P','138.7 bar'],['Temp out','94 °C ⚠'],['Vendor','Siemens Energy'],['Status','Running — alarm']],tags:[{l:'Equipment',c:'blue'},{l:'Alarm active',c:'red'}]},
  'V-4401':{props:[['Tag','V-4401'],['Type','Two-phase separator'],['Level','52%'],['Design P','50 bar'],['Status','Normal']],tags:[{l:'Equipment',c:'blue'}]},
  'E-4401':{props:[['Tag','E-4401'],['Type','Shell & tube HEX'],['Duty','1.8 MW'],['Efficiency','94% (↓6%)'],['Root cause','DEV-4420-01']],tags:[{l:'Equipment',c:'blue'},{l:'Root cause',c:'red'}]},
  'DEV-01':{props:[['ID','DEV-4420-01'],['Title','High discharge temperature'],['Value','94 °C'],['Limit','90 °C'],['Status','Open — urgent']],tags:[{l:'Deviation',c:'red'},{l:'Urgent',c:'red'}]},
  'DEV-02':{props:[['ID','DEV-4420-02'],['Title','Low anti-surge margin'],['Value','8.3%'],['Limit','10%'],['Status','Open']],tags:[{l:'Deviation',c:'red'}]},
  'ITP-4420':{props:[['Code','ITP-4420-001'],['Rev','B'],['Status','Approved'],['Date','05 Mar 2026']],tags:[{l:'Document',c:'green'},{l:'Approved',c:'green'}]},
  'PID-4420':{props:[['Code','PID-4420-003'],['Rev','A'],['Status','Overdue — 15 days'],['Due','10 Mar 2026']],tags:[{l:'Document',c:'green'},{l:'Overdue',c:'red'}]},
  'FAT-4420':{props:[['Code','FAT-4420-001'],['Rev','A'],['Status','In review'],['Flags','2 items']],tags:[{l:'Document',c:'green'},{l:'In review',c:'amber'}]},
  'WO-88241':{props:[['WO','WO-88241'],['Title','Lube oil sample'],['Due','25 Mar 2026 14:00'],['Priority','Routine']],tags:[{l:'Work order',c:'amber'}]},
  'WO-88310':{props:[['WO','WO-88310'],['Title','E-4401 backflush'],['Window','14:00 hold'],['Duration','45 min']],tags:[{l:'Work order',c:'amber'}]},
  'SYS-NCS1A':{props:[['ID','NCS-1A'],['Name','North Compression System 1A'],['Equipment','12 items'],['Status','Partially alarmed']],tags:[{l:'System',c:'gray'}]},
};
let tx=0,ty=0,sc=1,pan=false,lx=0,ly=0,dragN=null,dox=0,doy=0,sel=null,srch='';
function resize(){C.width=C.offsetWidth;C.height=C.offsetHeight;draw();}
function w2s(x,y){return{x:x*sc+tx,y:y*sc+ty};}
function s2w(x,y){return{x:(x-tx)/sc,y:(y-ty)/sc};}
function draw(){
  ctx.clearRect(0,0,C.width,C.height);
  const dk=window.matchMedia('(prefers-color-scheme:dark)').matches;
  ctx.fillStyle=dk?'#2c2c2a':'#f1efe8';ctx.fillRect(0,0,C.width,C.height);
  edges.forEach(e=>{
    const a=nodes.find(n=>n.id===e.from),b=nodes.find(n=>n.id===e.to);if(!a||!b)return;
    const s=w2s(a.x,a.y),t=w2s(b.x,b.y);
    const dx=t.x-s.x,dy=t.y-s.y,len=Math.sqrt(dx*dx+dy*dy);if(len<1)return;
    const ux=dx/len,uy=dy/len;
    const sx=s.x+ux*a.r*sc,sy=s.y+uy*a.r*sc,ex=t.x-ux*b.r*sc,ey=t.y-uy*b.r*sc;
    const hi=sel&&(sel.id===e.from||sel.id===e.to);
    const col=hi?COL[a.type]:(dk?'#444442':'#c8c4bc');
    ctx.save();ctx.globalAlpha=hi?0.65:0.3;ctx.strokeStyle=col;ctx.lineWidth=hi?1.5:1;
    ctx.beginPath();ctx.moveTo(sx,sy);ctx.lineTo(ex,ey);ctx.stroke();
    if(hi){
      const ax=ex-ux*7-uy*3.5,ay=ey-uy*7+ux*3.5,bx=ex-ux*7+uy*3.5,by=ey-uy*7-ux*3.5;
      ctx.globalAlpha=0.8;ctx.fillStyle=col;ctx.beginPath();ctx.moveTo(ex,ey);ctx.lineTo(ax,ay);ctx.lineTo(bx,by);ctx.closePath();ctx.fill();
      if(sc>0.65){const mx=(sx+ex)/2,my=(sy+ey)/2;ctx.globalAlpha=0.7;ctx.font=`${Math.max(9,9*sc)}px -apple-system,sans-serif`;ctx.fillStyle=dk?'#888':'#888780';ctx.textAlign='center';ctx.fillText(e.label,mx,my-4);}
    }
    ctx.restore();
  });
  nodes.forEach(n=>{
    const s=w2s(n.x,n.y),r=n.r*sc,col=COL[n.type]||'#888';
    const issel=sel&&sel.id===n.id,dim=srch&&!n.label.toLowerCase().includes(srch)&&!n.sub.toLowerCase().includes(srch);
    ctx.save();ctx.globalAlpha=dim?0.18:1;
    if(issel){ctx.shadowColor=col;ctx.shadowBlur=14*sc;}
    ctx.beginPath();ctx.arc(s.x,s.y,r,0,Math.PI*2);
    ctx.fillStyle=col+'20';ctx.fill();
    ctx.strokeStyle=col;ctx.lineWidth=issel?2.5:1.5;ctx.stroke();
    ctx.shadowBlur=0;ctx.fillStyle=col;
    ctx.font=`600 ${Math.max(8,Math.round(r*0.52))}px -apple-system,sans-serif`;
    ctx.textAlign='center';ctx.textBaseline='middle';ctx.fillText(n.label.charAt(0),s.x,s.y);
    if(sc>0.42){
      ctx.font=`500 ${Math.max(8,Math.round(10*sc))}px -apple-system,sans-serif`;
      ctx.fillStyle=dk?'#e8e6dc':'#2c2c2a';ctx.textBaseline='top';
      ctx.fillText(n.label,s.x,s.y+r+4*sc);
      if(sc>0.68){ctx.font=`${Math.max(7,Math.round(9*sc))}px -apple-system,sans-serif`;ctx.fillStyle=dk?'#666660':'#888780';ctx.fillText(n.sub,s.x,s.y+r+14*sc);}
    }
    ctx.restore();
  });
}
function nodeAt(sx,sy){const w=s2w(sx,sy);for(let i=nodes.length-1;i>=0;i--){const n=nodes[i],dx=w.x-n.x,dy=w.y-n.y;if(dx*dx+dy*dy<n.r*n.r)return n;}return null;}
function showDet(node){
  sel=node;const det=dets[node.id];const panel=document.getElementById('det');
  if(!det){panel.classList.remove('visible');draw();return;}
  const col=COL[node.type]||'#888';
  document.getElementById('dp-type').style.color=col;
  document.getElementById('dp-type').textContent=node.type.toUpperCase();
  document.getElementById('dp-name').textContent=node.label+' — '+node.sub;
  let h='';
  det.props.forEach(([k,v])=>h+=`<div class="dp-row"><span class="dp-label">${k}</span><span class="dp-val">${v}</span></div>`);
  if(det.tags){
    h+='<div class="dp-tags">';
    det.tags.forEach(t=>{
      const bg=t.c==='red'?'var(--red-bg)':t.c==='green'?'var(--green-bg)':t.c==='amber'?'var(--amber-bg)':t.c==='purple'?'var(--purple-bg)':'var(--blue-bg)';
      const fg=t.c==='red'?'var(--red-t)':t.c==='green'?'var(--green-t)':t.c==='amber'?'var(--amber-t)':t.c==='purple'?'var(--purple-t)':'var(--blue-t)';
      h+=`<span class="dp-tag" style="background:${bg};color:${fg}">${t.l}</span>`;
    });
    h+='</div>';
  }
  const conn=edges.filter(e=>e.from===node.id||e.to===node.id);
  if(conn.length){
    h+=`<div class="dp-edges"><div class="dp-edge-title">Connections (${conn.length})</div>`;
    conn.slice(0,7).forEach(e=>{const o=e.from===node.id?e.to:e.from,d=e.from===node.id?'→':'←';h+=`<div class="dp-edge-item" onclick="focus('${o}')">${d} ${e.label}: ${o}</div>`;});
    h+='</div>';
  }
  document.getElementById('dp-body').innerHTML=h;panel.classList.add('visible');draw();
}
window.focus=function(id){const n=nodes.find(x=>x.id===id);if(!n)return;tx=C.width/2-n.x*sc;ty=C.height/2-n.y*sc;showDet(n);}
function zoom(f){const cx=C.width/2,cy=C.height/2;tx=cx-(cx-tx)*f;ty=cy-(cy-ty)*f;sc*=f;draw();}
function reset(){tx=C.width/2-500;ty=C.height/2-300;sc=1;sel=null;document.getElementById('det').classList.remove('visible');draw();}
function handleSearch(v){srch=v.toLowerCase();draw();}
C.addEventListener('mousedown',e=>{const n=nodeAt(e.offsetX,e.offsetY);if(n){dragN=n;dox=e.offsetX-w2s(n.x,n.y).x;doy=e.offsetY-w2s(n.x,n.y).y;}else pan=true;lx=e.offsetX;ly=e.offsetY;});
C.addEventListener('mousemove',e=>{if(dragN){const w=s2w(e.offsetX-dox,e.offsetY-doy);dragN.x=w.x;dragN.y=w.y;draw();}else if(pan){tx+=e.offsetX-lx;ty+=e.offsetY-ly;lx=e.offsetX;ly=e.offsetY;draw();}});
C.addEventListener('mouseup',e=>{if(dragN){if(Math.abs(e.offsetX-lx)<4&&Math.abs(e.offsetY-ly)<4)showDet(dragN);dragN=null;}pan=false;});
C.addEventListener('click',e=>{if(!nodeAt(e.offsetX,e.offsetY)){sel=null;document.getElementById('det').classList.remove('visible');draw();}});
C.addEventListener('wheel',e=>{e.preventDefault();const f=e.deltaY<0?1.1:0.9;tx=e.offsetX-(e.offsetX-tx)*f;ty=e.offsetY-(e.offsetY-ty)*f;sc*=f;draw();},{passive:false});
window.addEventListener('resize',resize);resize();
setTimeout(()=>{tx=C.width/2-500;ty=C.height/2-300;draw();},50);
</script>
</body>
</html>
